name: "✨ Improvement Request"
description: "Suggest an improvement or enhancement to an existing feature."
title: "[Improvement] <short description>"
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! Please describe it clearly so we can evaluate and prioritize it.

        > 📋 **Review Required:** All improvement requests are reviewed and prioritised by the **@Avanade-Region-Spain/boltf-smes** team. You will be notified once your request has been assessed.

        **Note:** For brand-new features unrelated to existing functionality, consider opening a Feature Request instead.

  - type: textarea
    id: problem_statement
    attributes:
      label: "Problem Statement"
      description: "Describe the current limitation or pain point this improvement addresses."
      placeholder: "Currently, when I do X, I have to do Y manually which is inefficient because..."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: "Proposed Solution"
      description: "Describe how you would like this to be improved."
      placeholder: "It would be better if the system could automatically..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Have you considered any alternative approaches or workarounds?"
      placeholder: "I considered doing X but it doesn't work because..."
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "How important is this improvement to you?"
      options:
        - "High - Blocking or significantly impacting my workflow"
        - "Medium - Would meaningfully improve productivity"
        - "Low - Nice to have"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "Which area of the project does this improvement relate to?"
      options:
        - "Documentation"
        - "Developer Experience (DX)"
        - "Performance"
        - "Security"
        - "Testing"
        - "CI/CD"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      description: "Any screenshots, references, or links that support this request."
      placeholder: "Add links to similar implementations, design mockups, or related issues."
    validations:
      required: false
