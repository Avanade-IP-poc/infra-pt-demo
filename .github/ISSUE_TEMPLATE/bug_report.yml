name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior in the project."
title: "[Bug] <short description>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix it quickly.

        > 📋 **Review Required:** All issues are triaged and reviewed by the **@Avanade-Region-Spain/boltf-smes** team. You will be notified once your report has been assessed.

        **Note:** Search existing issues before submitting to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Provide a step-by-step guide to reproduce the issue."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
      placeholder: "The application should..."
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
      placeholder: "Instead, the application..."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "How severe is the impact of this bug?"
      options:
        - "Critical - System unusable / data loss"
        - "High - Major feature broken"
        - "Medium - Feature partially broken"
        - "Low - Minor inconvenience"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Provide relevant environment details."
      placeholder: |
        - OS: Windows 11 / macOS 15 / Ubuntu 24.04
        - Browser/Runtime version:
        - Project version / branch:
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      description: "Add any other context, screenshots, or logs that may help."
      placeholder: "Paste logs, stack traces, or attach screenshots here."
    validations:
      required: false
