# Bolt Framework Contract Testing Pipeline
# This workflow validates BDD/Gherkin contracts against implementation

name: Contract Tests

on:
  push:
    paths:
      - 'contracts/**'
      - 'src/**'
      - 'tests/**/*.feature'
  pull_request:
    paths:
      - 'contracts/**'
      - 'src/**'
      - 'tests/**/*.feature'
  workflow_dispatch:

jobs:
  # ============================================================================
  # Validate Contract Specifications
  # ============================================================================
  validate-specs:
    name: Validate Contract Specs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI specs
        run: |
          if [ -f "contracts/openapi.yaml" ]; then
            echo "Validating OpenAPI specification..."
            npx @redocly/cli lint contracts/openapi.yaml
          fi

      - name: Validate AsyncAPI specs
        run: |
          if [ -f "contracts/asyncapi.yaml" ]; then
            echo "Validating AsyncAPI specification..."
            npx @asyncapi/cli validate contracts/asyncapi.yaml
          fi

      - name: Validate GraphQL schema
        run: |
          if [ -f "contracts/schema.graphql" ]; then
            echo "Validating GraphQL schema..."
            npx graphql-inspector validate contracts/schema.graphql
          fi

  # ============================================================================
  # Run Gherkin/Cucumber Tests
  # ============================================================================
  cucumber-tests:
    name: Cucumber BDD Tests
    runs-on: ubuntu-latest
    needs: [validate-specs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cucumber tests
        run: |
          npm run test:cucumber --if-present || echo "No Cucumber tests configured"

      - name: Generate Cucumber report
        if: always()
        run: |
          if [ -f "cucumber-report.json" ]; then
            npx cucumber-html-reporter \
              --input cucumber-report.json \
              --output reports/cucumber-report.html
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: cucumber-results
          path: |
            reports/cucumber-*.html
            cucumber-report.json

  # ============================================================================
  # API Contract Tests (Consumer-Driven)
  # ============================================================================
  pact-tests:
    name: Pact Contract Tests
    runs-on: ubuntu-latest
    needs: [validate-specs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pact consumer tests
        run: |
          npm run test:pact:consumer --if-present || echo "No Pact consumer tests"

      - name: Run Pact provider verification
        run: |
          npm run test:pact:provider --if-present || echo "No Pact provider tests"

      - name: Publish Pact contracts
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Publishing Pact contracts to broker..."
          # npx pact-broker publish pacts --broker-base-url=$PACT_BROKER_URL
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  # ============================================================================
  # Feature File Analysis (Domain Sage validation)
  # ============================================================================
  feature-analysis:
    name: Feature File Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Count feature files
        id: features
        run: |
          COUNT=$(find . -name "*.feature" -type f | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT feature files"

      - name: Validate Gherkin syntax
        run: |
          if command -v gherkin-lint &> /dev/null; then
            gherkin-lint contracts/**/*.feature tests/**/*.feature
          else
            echo "Gherkin linter not installed, skipping syntax check"
          fi

      - name: Check for missing scenarios
        run: |
          echo "Checking for business rules without test scenarios..."
          # Compare domain rules with feature coverage

      - name: Generate coverage matrix
        run: |
          echo "## Contract Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Type | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          FEATURE_COUNT=$(find . -name "*.feature" -type f 2>/dev/null | wc -l)
          OPENAPI=$([ -f "contracts/openapi.yaml" ] && echo "✅" || echo "❌")
          ASYNCAPI=$([ -f "contracts/asyncapi.yaml" ] && echo "✅" || echo "❌")
          GRAPHQL=$([ -f "contracts/schema.graphql" ] && echo "✅" || echo "❌")
          
          echo "| Feature Files | $FEATURE_COUNT | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenAPI | - | $OPENAPI |" >> $GITHUB_STEP_SUMMARY
          echo "| AsyncAPI | - | $ASYNCAPI |" >> $GITHUB_STEP_SUMMARY
          echo "| GraphQL | - | $GRAPHQL |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Contract Drift Detection
  # ============================================================================
  drift-detection:
    name: Detect Contract Drift
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5

      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Compare contracts
        run: |
          echo "Comparing contracts between branches..."
          
          # Compare OpenAPI specs
          if [ -f "contracts/openapi.yaml" ] && [ -f "base/contracts/openapi.yaml" ]; then
            echo "## OpenAPI Changes" >> $GITHUB_STEP_SUMMARY
            diff contracts/openapi.yaml base/contracts/openapi.yaml || echo "Changes detected"
          fi

      - name: Check for breaking changes
        run: |
          echo "Checking for breaking API changes..."
          # Use openapi-diff or similar tool
          # npx openapi-diff base/contracts/openapi.yaml contracts/openapi.yaml

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Contract Analysis\n\nContract validation completed. Check the workflow summary for details.'
            })
