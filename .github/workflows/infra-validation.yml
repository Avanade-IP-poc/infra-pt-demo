# Bolt Framework Infrastructure Validation Pipeline
# This workflow validates Infrastructure as Code changes

name: Infrastructure Validation

on:
  push:
    paths:
      - 'infra/**'
      - 'terraform/**'
      - 'bicep/**'
      - 'kubernetes/**'
      - 'helm/**'
  pull_request:
    paths:
      - 'infra/**'
      - 'terraform/**'
      - 'bicep/**'
      - 'kubernetes/**'
      - 'helm/**'
  workflow_dispatch:

env:
  TF_VERSION: '1.6.0'

jobs:
  # ============================================================================
  # File Detection (hashFiles() is not available in job-level if:)
  # ============================================================================
  detect-files:
    name: Detect IaC File Types
    runs-on: ubuntu-latest
    outputs:
      has-terraform: ${{ steps.detect.outputs.has-terraform }}
      has-bicep: ${{ steps.detect.outputs.has-bicep }}
      has-kubernetes: ${{ steps.detect.outputs.has-kubernetes }}
      has-helm: ${{ steps.detect.outputs.has-helm }}
      has-docker: ${{ steps.detect.outputs.has-docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect IaC files
        id: detect
        run: |
          if [ -d terraform ] && find terraform -name '*.tf' | grep -q .; then
            echo "has-terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-terraform=false" >> "$GITHUB_OUTPUT"
          fi
          find . -name '*.bicep' -not -path '*/node_modules/*' | grep -q . \
            && echo "has-bicep=true" >> "$GITHUB_OUTPUT" \
            || echo "has-bicep=false" >> "$GITHUB_OUTPUT"
          find . \( -path '*/kubernetes/*' -o -path '*/k8s/*' \) \
            \( -name '*.yaml' -o -name '*.yml' \) | grep -q . \
            && echo "has-kubernetes=true" >> "$GITHUB_OUTPUT" \
            || echo "has-kubernetes=false" >> "$GITHUB_OUTPUT"
          find . -name 'Chart.yaml' | grep -q . \
            && echo "has-helm=true" >> "$GITHUB_OUTPUT" \
            || echo "has-helm=false" >> "$GITHUB_OUTPUT"
          find . -name 'Dockerfile*' | grep -q . \
            && echo "has-docker=true" >> "$GITHUB_OUTPUT" \
            || echo "has-docker=false" >> "$GITHUB_OUTPUT"

  # ============================================================================
  # Terraform Validation
  # ============================================================================
  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    needs: detect-files
    if: needs.detect-files.outputs.has-terraform == 'true'
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v5
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
        continue-on-error: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-terraform.sarif

  # ============================================================================
  # Terraform Plan (on PR)
  # ============================================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    if: github.event_name == 'pull_request'
    environment: terraform-plan
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          cat plan-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## Terraform Plan

            \`\`\`
            ${{ steps.plan.outputs.plan }}
            \`\`\`

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.substring(0, 65000)  // GitHub comment limit
            });

  # ============================================================================
  # Bicep Validation
  # ============================================================================
  bicep-validate:
    name: Bicep Validation
    runs-on: ubuntu-latest
    needs: detect-files
    if: needs.detect-files.outputs.has-bicep == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bicep
        uses: azure/setup-bicep@v0.1

      - name: Build Bicep files
        run: |
          find . -name "*.bicep" -exec bicep build {} \;

      - name: Lint Bicep files
        run: |
          find . -name "*.bicep" -exec bicep lint {} \;

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: bicep
        continue-on-error: true

  # ============================================================================
  # Kubernetes Manifests Validation
  # ============================================================================
  kubernetes-validate:
    name: Kubernetes Validation
    runs-on: ubuntu-latest
    needs: detect-files
    if: needs.detect-files.outputs.has-kubernetes == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate manifests
        run: |
          find kubernetes -name "*.yaml" -o -name "*.yml" | while read file; do
            echo "Validating $file..."
            kubectl apply --dry-run=client -f "$file" 2>&1 || true
          done

      - name: KubeLinter
        uses: stackrox/kube-linter-action@v1
        with:
          directory: kubernetes
          config: .kube-linter.yaml
        continue-on-error: true

      - name: Kubesec Scan
        run: |
          curl -sSX POST --data-binary @kubernetes/deployment.yaml https://v2.kubesec.io/scan || true

      - name: Checkov Kubernetes Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: kubernetes
          framework: kubernetes
        continue-on-error: true

  # ============================================================================
  # Helm Chart Validation
  # ============================================================================
  helm-validate:
    name: Helm Validation
    runs-on: ubuntu-latest
    needs: detect-files
    if: needs.detect-files.outputs.has-helm == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Lint Helm charts
        run: |
          find . -name "Chart.yaml" -exec dirname {} \; | while read chart; do
            echo "Linting $chart..."
            helm lint "$chart"
          done

      - name: Template Helm charts
        run: |
          find . -name "Chart.yaml" -exec dirname {} \; | while read chart; do
            echo "Templating $chart..."
            helm template test "$chart" > /dev/null
          done

      - name: Helm unittest
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git || true
          find . -name "Chart.yaml" -exec dirname {} \; | while read chart; do
            if [ -d "$chart/tests" ]; then
              helm unittest "$chart"
            fi
          done

  # ============================================================================
  # Docker Validation
  # ============================================================================
  docker-validate:
    name: Docker Validation
    runs-on: ubuntu-latest
    needs: detect-files
    if: needs.detect-files.outputs.has-docker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Hadolint Dockerfile Linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

      - name: Build test image
        run: |
          if [ -f "Dockerfile" ]; then
            docker build --target test -t test-image . || docker build -t test-image .
          fi

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        if: hashFiles('Dockerfile') != ''
        with:
          image-ref: 'test-image'
          format: 'sarif'
          output: 'trivy-docker.sarif'
        continue-on-error: true

  # ============================================================================
  # Cost Estimation
  # ============================================================================
  cost-estimation:
    name: Infrastructure Cost Estimation
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost breakdown
        run: |
          infracost breakdown --path=terraform --format=json --out-file=/tmp/infracost.json || true

      - name: Post cost comment
        uses: infracost/actions/comment@v1
        if: hashFiles('/tmp/infracost.json') != ''
        with:
          path: /tmp/infracost.json
          behavior: update

  # ============================================================================
  # Summary
  # ============================================================================
  infra-summary:
    name: Infrastructure Summary
    runs-on: ubuntu-latest
    needs: [detect-files, terraform-validate, bicep-validate, kubernetes-validate, helm-validate, docker-validate]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Infrastructure Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ needs.terraform-validate.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bicep | ${{ needs.bicep-validate.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kubernetes | ${{ needs.kubernetes-validate.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm | ${{ needs.helm-validate.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker-validate.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
