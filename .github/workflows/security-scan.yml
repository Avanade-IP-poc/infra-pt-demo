# Bolt Framework Security Scanning Pipeline
# Comprehensive security analysis aligned with Policy Guardian Agent

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * *'  # Daily at 3:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ============================================================================
  # SAST - Static Application Security Testing
  # ============================================================================
  sast:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/security-audit
          generateSarif: true

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # ============================================================================
  # Dependency Vulnerability Scanning
  # ============================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --json > npm-audit.json || true
          echo "## NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          cat npm-audit.json | jq -r '.metadata | "Vulnerabilities: \(.vulnerabilities.total) (Critical: \(.vulnerabilities.critical), High: \(.vulnerabilities.high))"' >> $GITHUB_STEP_SUMMARY

      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Bolt Framework-dlc'
          path: '.'
          format: 'SARIF'
          out: 'reports'

      - name: Upload Dependency Check results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif

  # ============================================================================
  # Secret Detection
  # ============================================================================
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Detect secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ============================================================================
  # Container Security
  # ============================================================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Hadolint for Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ============================================================================
  # Infrastructure as Code Security
  # ============================================================================
  iac-security:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('**/terraform/**/*.tf') != '' || hashFiles('**/cloudformation/**/*.yml') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov IaC scanner
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,cloudformation,kubernetes
          output_format: sarif
          output_file_path: results.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Run tfsec for Terraform
        uses: aquasecurity/tfsec-action@v1.0.0
        if: hashFiles('**/terraform/**/*.tf') != ''
        with:
          soft_fail: true
          sarif_file: tfsec.sarif

      - name: Upload tfsec results
        if: hashFiles('**/terraform/**/*.tf') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif

  # ============================================================================
  # API Security Testing
  # ============================================================================
  api-security:
    name: API Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('**/openapi*.yml') != '' || hashFiles('**/openapi*.yaml') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find OpenAPI specs
        id: find-specs
        run: |
          SPECS=$(find . -name "openapi*.yml" -o -name "openapi*.yaml" | head -1)
          echo "spec_file=$SPECS" >> $GITHUB_OUTPUT

      - name: Run API security audit
        uses: 42crunch/api-security-audit-action@v3
        if: steps.find-specs.outputs.spec_file != ''
        with:
          api-token: ${{ secrets.API_SECURITY_TOKEN }}
          min-score: 70

      - name: Validate OpenAPI spec security
        if: steps.find-specs.outputs.spec_file != ''
        run: |
          npm install -g @stoplight/spectral-cli
          spectral lint ${{ steps.find-specs.outputs.spec_file }} --ruleset spectral:oas

  # ============================================================================
  # License Compliance
  # ============================================================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --summary --production > license-summary.txt
          
          # Check for problematic licenses
          PROBLEMATIC=$(npx license-checker --production --onlyAllow "MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense" 2>&1 || true)
          
          if echo "$PROBLEMATIC" | grep -q "FAIL"; then
            echo "⚠️ Some dependencies have non-approved licenses"
            echo "## License Issues Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$PROBLEMATIC" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## License Check Passed" >> $GITHUB_STEP_SUMMARY
            echo "All dependencies use approved licenses" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-summary.txt

  # ============================================================================
  # Security Report Summary
  # ============================================================================
  security-report:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan, secret-scan]
    if: always()
    steps:
      - name: Generate security summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.sast.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Action Required**: One or more security checks failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on critical findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Critical findings in security scan - ${new Date().toISOString().split('T')[0]}`,
              body: `## Security Alert
              
              The security scan workflow has detected issues that require attention.
              
              **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              
              Please review the security findings and address critical vulnerabilities.`,
              labels: ['security', 'critical', 'automated']
            });
