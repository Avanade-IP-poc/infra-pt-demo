# Workflow para configurar el entorno del Copilot Cloud Agent
# Instala dependencias necesarias para los servidores MCP locales (npx)
# Ref: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/customize-the-agent-environment
#
# NOTA: añade aquí los pasos de instalación específicos del stack de tu proyecto
# (SDKs, CLIs, login en proveedores cloud, etc.). Este fichero base sólo prepara
# Node.js para los servidores MCP locales.
name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: copilot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Node.js 22 (incluye npx para servidores MCP locales)
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
