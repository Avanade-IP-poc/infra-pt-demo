# =============================================================================
# AURORA-IA Setup Stack Action
# =============================================================================
# Reusable action to setup technology stack for security analysis
# Supports: Node.js, .NET, Java, Python, Go
# =============================================================================

name: "Setup Technology Stack"
description: "Setup technology stack for AURORA-IA security analysis"

inputs:
  stack:
    description: "Technology stack to setup (nodejs|dotnet|java|python|golang)"
    required: true
  node-version:
    description: "Node.js version to setup"
    required: false
    default: "20"
  dotnet-version:
    description: ".NET version to setup"
    required: false
    default: "8.0.x"
  java-version:
    description: "Java version to setup"
    required: false
    default: "17"
  python-version:
    description: "Python version to setup"
    required: false
    default: "3.11"
  go-version:
    description: "Go version to setup"
    required: false
    default: "1.21"

runs:
  using: composite
  steps:
    - name: "Setup Node.js"
      if: inputs.stack == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          yarn.lock
    
    - name: "Setup .NET"
      if: inputs.stack == 'dotnet'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
    
    - name: "Setup Java"
      if: inputs.stack == 'java'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
    
    - name: "Setup Python"
      if: inputs.stack == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          pyproject.toml
          setup.py
    
    - name: "Setup Go"
      if: inputs.stack == 'golang'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
    
    - name: "Install dependencies - Node.js"
      if: inputs.stack == 'nodejs'
      shell: bash
      run: |
        if [[ -f "package-lock.json" ]]; then
          npm ci
        elif [[ -f "yarn.lock" ]]; then
          yarn install --frozen-lockfile
        elif [[ -f "package.json" ]]; then
          npm install
        fi
    
    - name: "Install dependencies - .NET"
      if: inputs.stack == 'dotnet'
      shell: bash
      run: |
        if ls *.sln 1> /dev/null 2>&1; then
          dotnet restore *.sln
        elif ls *.csproj 1> /dev/null 2>&1; then
          dotnet restore
        fi
    
    - name: "Install dependencies - Java"
      if: inputs.stack == 'java'
      shell: bash
      run: |
        if [[ -f "pom.xml" ]]; then
          mvn dependency:resolve
        elif [[ -f "build.gradle" ]] || [[ -f "build.gradle.kts" ]]; then
          ./gradlew build --no-daemon
        fi
    
    - name: "Install dependencies - Python"
      if: inputs.stack == 'python'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [[ -f "requirements.txt" ]]; then
          pip install -r requirements.txt
        elif [[ -f "pyproject.toml" ]]; then
          pip install -e .
        elif [[ -f "setup.py" ]]; then
          pip install -e .
        fi
    
    - name: "Install dependencies - Go"
      if: inputs.stack == 'golang'
      shell: bash
      run: |
        if [[ -f "go.mod" ]]; then
          go mod download
          go mod verify
        fi
    
    - name: "Verify setup"
      shell: bash
      run: |
        echo "Technology stack setup completed: ${{ inputs.stack }}"
        
        case "${{ inputs.stack }}" in
          "nodejs")
            echo "Node.js version: $(node --version)"
            echo "npm version: $(npm --version)"
            if command -v yarn >/dev/null 2>&1; then
              echo "Yarn version: $(yarn --version)"
            fi
            ;;
          "dotnet")
            echo ".NET version: $(dotnet --version)"
            dotnet --info
            ;;
          "java")
            echo "Java version: $(java -version 2>&1 | head -n 1)"
            if command -v mvn >/dev/null 2>&1; then
              echo "Maven version: $(mvn --version | head -n 1)"
            fi
            if command -v gradle >/dev/null 2>&1; then
              echo "Gradle version: $(gradle --version | grep 'Gradle')"
            fi
            ;;
          "python")
            echo "Python version: $(python --version)"
            echo "pip version: $(pip --version)"
            ;;
          "golang")
            echo "Go version: $(go version)"
            ;;
        esac