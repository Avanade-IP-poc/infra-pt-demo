version: 1
scope: frontend
description: Artefactos frontend reutilizables para el proyecto destino.
items:
  - id: frontend-mcp-settings-local
    kind: templates
    enabled: false
    tags: ['mcp', 'settings']
    source:
      type: local_file
      path: scopes/frontend/mcp-tools/default.mcp.settings.json
    destination:
      folder: .vscode
      name: settings.json

  - id: frontend-react-awesome
    kind: instructions
    enabled: false
    tags: ['frontend', 'react']
