version: 1
scope: integration
description: Integraciones y sincronización entre artefactos AURORA y herramientas externas.
items:
  - id: integration-azure-devops-sync-skill
    kind: skills
    enabled: false
    source:
      type: local_folder
      path: available-skills/azure-devops-sync
    destination:
      folder: .github/skills
      name: azure-devops-sync

  - id: integration-azure-wiki-agent-skill
    kind: skills
    enabled: false
    source:
      type: local_folder
      path: available-skills/azure-wiki-agent
    destination:
      folder: .github/skills
      name: azure-wiki-agent

  - id: integration-azure-devops-pipelines-context7
    kind: prompts
    enabled: false
    source:
      type: context7
      library: /microsoftdocs/azure-docs
      query: Orchestrate Multi-Stage Deployment to Azure Web Apps in YAML
    destination:
      folder: .github/prompts
      name: azure-devops-multistage-deploy.prompt.md

  - id: integration-spec-driven-workflow-awesome
    kind: instructions
    enabled: false
    source:
      type: awesome_copilot
      collection: project-planning
      item_path: instructions/spec-driven-workflow-v1.instructions.md
    destination:
      folder: .github/instructions
      name: spec-driven-workflow-v1.instructions.md
