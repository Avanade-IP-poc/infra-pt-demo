version: 1
scope: ai
description: Artefactos relacionados con agentes, prompts y automatización AI.
items:
  - id: ai-mcp-settings-local
    kind: templates
    enabled: false
    tags: ['mcp', 'settings']
    source:
      type: local_file
      path: scopes/ai/mcp-tools/default.mcp.settings.json
    destination:
      folder: .vscode
      name: settings.json

  - id: ai-task-implementation-awesome
    kind: instructions
    enabled: false
    tags: ['planning', 'implementation']
    source:
      type: awesome_copilot
      collection: project-planning
      item_path: instructions/task-implementation.instructions.md
      resolved_url: https://github.com/github/awesome-copilot/tree/main/collections/project-planning/instructions/task-implementation.instructions.md
      resolved_ref: main
      resolved_doc_id: project-planning/instructions/task-implementation.instructions.md
      content_hash: ''
      fetched_at: ''
      license: repository-defined
    destination:
      folder: .github/instructions
      name: task-implementation.instructions.md

  - id: ai-prompt-safety-review-awesome
    kind: prompts
    enabled: false
    tags: ['ai', 'safety']
    source:
      type: awesome_copilot
      collection: security-best-practices
      item_path: prompts/ai-prompt-engineering-safety-review.prompt.md
      resolved_url: https://github.com/github/awesome-copilot/tree/main/collections/security-best-practices/prompts/ai-prompt-engineering-safety-review.prompt.md
      resolved_ref: main
      resolved_doc_id: security-best-practices/prompts/ai-prompt-engineering-safety-review.prompt.md
      content_hash: ''
      fetched_at: ''
      license: repository-defined
    destination:
      folder: .github/prompts
      name: ai-prompt-engineering-safety-review.prompt.md

  - id: ai-opentelemetry-dotnet-context7
    kind: prompts
    enabled: false
    tags: ['csharp', 'observability']
    source:
      type: context7
      library: /websites/opentelemetry_io
      query: Configure OpenTelemetry in Program.cs
      resolved_url: https://opentelemetry.io/docs/languages/dotnet/
      resolved_ref: latest
      resolved_doc_id: opentelemetry-dotnet-getting-started
      content_hash: ''
      fetched_at: ''
      license: OpenTelemetry docs terms
    destination:
      folder: .github/prompts
      name: ai-observability-opentelemetry-dotnet.prompt.md

  - id: ai-kdense-scientific-skills-awesome-skills
    kind: skills
    enabled: false
    tags: ['ai', 'ml']
    source:
      type: awesome_skills
      catalog_url: https://awesome-skills.com/
      repository: https://github.com/K-Dense-AI/claude-scientific-skills
