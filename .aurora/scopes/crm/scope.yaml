version: 1
scope: crm
description: Artefactos CRM para usar cuando exista evidencia/definición específica.
items:
  - id: crm-mcp-settings-local
    kind: templates
    enabled: false
    tags: ['mcp', 'settings']
    source:
      type: local_file
      path: scopes/crm/mcp-tools/default.mcp.settings.json
    destination:
      folder: .vscode
      name: settings.json

  - id: crm-mcp-servers-local
    kind: templates
    enabled: false
    tags: ['mcp', 'servers']
    source:
      type: local_file
      path: scopes/crm/mcp-tools/default.mcp.servers.json
    destination:
      folder: .vscode
      name: mcp.json

  - id: crm-power-apps-code-apps-instruction
    kind: instructions
    enabled: false
    tags: ['crm', 'powerapps']
    source:
      type: awesome_copilot
      collection: power-apps-code-apps
      item_path: instructions/power-apps-code-apps.instructions.md
      resolved_url: https://github.com/github/awesome-copilot/tree/main/collections/power-apps-code-apps/instructions/power-apps-code-apps.instructions.md
      resolved_ref: main
      resolved_doc_id: power-apps-code-apps/instructions/power-apps-code-apps.instructions.md
      content_hash: ''
      fetched_at: ''
      license: repository-defined
    destination:
      folder: .github/instructions
      name: power-apps-code-apps.instructions.md

  - id: crm-power-apps-scaffold-prompt
    kind: prompts
    enabled: false
    tags: ['crm', 'powerapps']
    source:
      type: awesome_copilot
      collection: power-apps-code-apps
      item_path: prompts/power-apps-code-app-scaffold.prompt.md
      resolved_url: https://github.com/github/awesome-copilot/tree/main/collections/power-apps-code-apps/prompts/power-apps-code-app-scaffold.prompt.md
      resolved_ref: main
      resolved_doc_id: power-apps-code-apps/prompts/power-apps-code-app-scaffold.prompt.md
      content_hash: ''
      fetched_at: ''
      license: repository-defined
    destination:
      folder: .github/prompts
      name: power-apps-code-app-scaffold.prompt.md

  - id: crm-power-platform-mcp-instruction
    kind: instructions
    enabled: false
    tags: ['crm', 'powerplatform']
    source:
      type: awesome_copilot
      collection: power-platform-mcp-connector-development
      item_path: instructions/power-platform-mcp-development.instructions.md
      resolved_url: https://github.com/github/awesome-copilot/tree/main/collections/power-platform-mcp-connector-development/instructions/power-platform-mcp-development.instructions.md
      resolved_ref: main
      resolved_doc_id: power-platform-mcp-connector-development/instructions/power-platform-mcp-development.instructions.md
      content_hash: ''
      fetched_at: ''
      license: repository-defined
    destination:
      folder: .github/instructions
      name: power-platform-mcp-development.instructions.md

  - id: crm-anthropic-internal-comms-awesome-skills
    kind: skills
    enabled: false
    tags: ['crm', 'communication']
    source:
      type: awesome_skills
      catalog_url: https://awesome-skills.com/
      repository: https://github.com/anthropics/skills
      skill_path: skills/internal-comms
      listing_url: https://github.com/anthropics/skills/tree/main/skills/internal-comms
      resolved_url: https://github.com/anthropics/skills/tree/main/skills/internal-comms
      resolved_ref: main
      resolved_doc_id: anthropics/skills/internal-comms
      content_hash: ''
      fetched_at: ''
      license: repository-defined
    destination:
      folder: .github/skills
      name: internal-comms

  - id: crm-constitution
    kind: templates
    enabled: true
    auto_provision: true  # Automatically copy when scope is active
    tags: ['constitution', 'memory']
    source:
      type: local_file
      path: scopes/crm/memory/constitution.md
    destination:
      folder: memory
      name: constitution.md
