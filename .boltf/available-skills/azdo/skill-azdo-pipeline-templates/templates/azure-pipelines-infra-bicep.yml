trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'infra/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'Azure-Service-Connection'
  resourceGroupName: 'rg-placeholder-prod'
  location: 'westeurope'
  bicepFile: 'infra/main.bicep'
  parameterFile: 'infra/main.parameters.prod.json'

stages:
  - stage: ValidateInfrastructure
    displayName: 'Validate infrastructure'
    jobs:
      - job: ValidateBicep
        displayName: 'Lint and validate Bicep'
        steps:
          - task: AzureCLI@2
            displayName: 'Run Bicep validation'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create --name $(resourceGroupName) --location $(location)

                az deployment group validate \
                  --resource-group $(resourceGroupName) \
                  --template-file $(bicepFile) \
                  --parameters @$(parameterFile)

  - stage: DeployInfrastructure
    displayName: 'Deploy infrastructure'
    dependsOn: ValidateInfrastructure
    condition: succeeded()
    jobs:
      - deployment: DeployBicep
        environment: 'production-infrastructure'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Deploy Bicep template'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az deployment group create \
                        --resource-group $(resourceGroupName) \
                        --template-file $(bicepFile) \
                        --parameters @$(parameterFile)
